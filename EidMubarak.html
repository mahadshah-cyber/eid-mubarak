<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Amiri:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0D1117;
  font-family: 'Cormorant Garamond', serif;
  color: #FAF5E8;
  min-height: 100vh;
  text-align: center;
  overflow-x: hidden;
}

#stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

.star {
  position: absolute;
  border-radius: 50%;
  background: white;
  opacity: 0;
  animation: twinkle var(--d) ease-in-out infinite alternate;
  animation-delay: var(--dl);
}

@keyframes twinkle {
  from { opacity: 0; }
  to   { opacity: var(--op); }
}

.moon {
  position: fixed;
  top: 5%; left: 50%;
  transform: translateX(-50%);
  width: 110px; height: 110px;
  border-radius: 50%;
  background: radial-gradient(circle at 38% 38%, #F0E6C0, #D4BB80 60%, #9A7D35);
  box-shadow: 0 0 60px 20px rgba(201,168,76,0.25), inset -18px -10px 30px rgba(0,0,0,0.2);
  animation: float 6s ease-in-out infinite alternate;
  z-index: 1;
}

@keyframes float {
  from { transform: translateX(-50%) translateY(0); }
  to   { transform: translateX(-50%) translateY(-16px); }
}

.lantern { position: fixed; top: 0; z-index: 1; }
.lantern.left  { left: 4%; }
.lantern.right { right: 4%; }

.lantern svg {
  width: 44px;
  filter: drop-shadow(0 0 14px rgba(201,168,76,0.5));
  animation: swing 4s ease-in-out infinite alternate;
  transform-origin: top center;
}

.lantern.right svg { animation-delay: -2s; }

@keyframes swing {
  from { transform: rotate(-12deg); }
  to   { transform: rotate(12deg); }
}

.particle {
  position: fixed;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: #C9A84C;
  opacity: 0;
  pointer-events: none;
  animation: fall var(--pd) linear var(--pdl) infinite;
}

@keyframes fall {
  0%   { transform: translateY(-10px); opacity: 0; }
  10%  { opacity: 0.5; }
  90%  { opacity: 0.2; }
  100% { transform: translateY(110vh); opacity: 0; }
}

.border { position: fixed; inset: 14px; border: 1px solid rgba(201,168,76,0.15); pointer-events: none; z-index: 3; }
.c { position: absolute; width: 26px; height: 26px; border-color: #C9A84C; border-style: solid; opacity: 0.6; }
.tl { top: -1px; left: -1px;    border-width: 2px 0 0 2px; }
.tr { top: -1px; right: -1px;   border-width: 2px 2px 0 0; }
.bl { bottom: -1px; left: -1px;  border-width: 0 0 2px 2px; }
.br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

main {
  position: relative; z-index: 2;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh;
  padding: 200px 24px 80px;
  gap: 1rem;
}

.arabic {
  font-family: 'Amiri', serif;
  font-size: clamp(2.2rem, 6vw, 4.5rem);
  color: #E8C97A;
  text-shadow: 0 0 30px rgba(201,168,76,0.4);
  animation: up 1s ease 0.2s both;
}

.divider {
  display: flex; align-items: center; gap: 14px;
  width: min(560px, 90vw);
  animation: up 1s ease 0.35s both;
}

.divider span { flex: 1; height: 1px; background: linear-gradient(to right, transparent, #C9A84C, transparent); }
.diamond { width: 9px; height: 9px; background: #C9A84C; transform: rotate(45deg); }

.headline {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(2.6rem, 7vw, 6rem);
  font-weight: 700;
  color: #E8C97A;
  letter-spacing: 0.05em;
  line-height: 1.1;
  animation: up 1s ease 0.5s both;
}

.headline small {
  display: block;
  font-size: 0.6em;
  color: #FAF5E8;
  font-weight: 400;
  letter-spacing: 0.18em;
}

.message {
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1rem, 2vw, 1.3rem);
  color: rgba(250,245,232,0.7);
  max-width: 500px;
  line-height: 2;
  animation: up 1s ease 0.65s both;
}

.from { margin-top: 0.5rem; animation: up 1s ease 0.8s both; }
.from p:first-child { font-size: 0.7rem; letter-spacing: 0.22em; text-transform: uppercase; color: #8B6914; }
.from p:last-child  { font-family: 'Cinzel Decorative', serif; font-size: clamp(0.9rem, 2vw, 1.3rem); color: #E8C97A; letter-spacing: 0.08em; margin-top: 4px; }

@keyframes up {
  from { opacity: 0; transform: translateY(24px); }
  to   { opacity: 1; transform: translateY(0); }
}

#panel {
  position: fixed; bottom: 24px; right: 24px; z-index: 100;
  background: rgba(13,17,23,0.93);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 12px; padding: 18px 20px; width: 270px;
  backdrop-filter: blur(10px);
  transition: transform 0.4s, opacity 0.4s;
}

#panel.hide { transform: translateY(120%); opacity: 0; pointer-events: none; }

#panel h3 { font-family: 'Cinzel Decorative', serif; font-size: 0.7rem; color: #C9A84C; letter-spacing: 0.15em; margin-bottom: 12px; }

#panel label { display: block; font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(250,245,232,0.45); margin: 8px 0 3px; }

#panel input, #panel textarea {
  width: 100%; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(201,168,76,0.2); border-radius: 6px;
  color: #FAF5E8; font-family: inherit; font-size: 0.9rem;
  padding: 6px 9px; outline: none; resize: none;
  transition: border-color 0.2s;
}

#panel input:focus, #panel textarea:focus { border-color: #C9A84C; }

.btn {
  display: block; width: 100%; margin-top: 10px; padding: 8px;
  background: #8B6914; border: none; border-radius: 7px;
  color: #FAF5E8; font-family: 'Cinzel Decorative', serif;
  font-size: 0.68rem; letter-spacing: 0.08em; cursor: pointer;
  transition: background 0.2s;
}

.btn:hover { background: #C9A84C; color: #0D1117; }
.btn.out { background: transparent; border: 1px solid rgba(201,168,76,0.35); margin-top: 6px; }

#fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 101;
  width: 46px; height: 46px; border-radius: 50%;
  background: #8B6914; border: 2px solid #C9A84C;
  color: #FAF5E8; font-size: 1.1rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(201,168,76,0.3);
  transition: all 0.25s;
}

#fab.open { bottom: calc(24px + 310px + 12px); background: transparent; }
#fab:hover { transform: scale(1.08); }
</style>
</head>
<body>

<div class="border">
  <div class="c tl"></div>
  <div class="c tr"></div>
  <div class="c bl"></div>
  <div class="c br"></div>
</div>

<div id="stars"></div>

<div class="moon"></div>

<div class="lantern left">
  <svg viewBox="0 0 44 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="22" y1="0" x2="22" y2="12" stroke="#C9A84C" stroke-width="1.5"/>
    <rect x="8" y="12" width="28" height="4" rx="2" fill="#C9A84C"/>
    <rect x="10" y="16" width="24" height="72" rx="12" fill="rgba(201,168,76,0.12)" stroke="#C9A84C" stroke-width="1"/>
    <rect x="12" y="20" width="4" height="60" rx="2" fill="rgba(201,168,76,0.3)"/>
    <rect x="20" y="20" width="4" height="60" rx="2" fill="rgba(201,168,76,0.3)"/>
    <rect x="28" y="20" width="4" height="60" rx="2" fill="rgba(201,168,76,0.3)"/>
    <ellipse cx="22" cy="55" rx="6" ry="9" fill="rgba(232,201,122,0.5)"/>
    <ellipse cx="22" cy="88" rx="14" ry="3" fill="#8B6914"/>
    <line x1="16" y1="88" x2="14" y2="106" stroke="#C9A84C" stroke-width="1"/>
    <line x1="22" y1="88" x2="22" y2="108" stroke="#C9A84C" stroke-width="1"/>
    <line x1="28" y1="88" x2="30" y2="106" stroke="#C9A84C" stroke-width="1"/>
    <circle cx="14" cy="108" r="2.5" fill="#C9A84C"/>
    <circle cx="22" cy="110" r="2.5" fill="#C9A84C"/>
    <circle cx="30" cy="108" r="2.5" fill="#C9A84C"/>
  </svg>
</div>

<div class="lantern right">
  <svg viewBox="0 0 44 120" xmlns="http://www.w3.org/2000/svg">
    <line x1="22" y1="0" x2="22" y2="12" stroke="#C9A84C" stroke-width="1.5"/>
    <rect x="8" y="12" width="28" height="4" rx="2" fill="#C9A84C"/>
    <rect x="10" y="16" width="24" height="72" rx="12" fill="rgba(201,168,76,0.12)" stroke="#C9A84C" stroke-width="1"/>
    <rect x="12" y="20" width="4" height="60" rx="2" fill="rgba(201,168,76,0.3)"/>
    <rect x="20" y="20" width="4" height="60" rx="2" fill="rgba(201,168,76,0.3)"/>
    <rect x="28" y="20" width="4" height="60" rx="2" fill="rgba(201,168,76,0.3)"/>
    <ellipse cx="22" cy="55" rx="6" ry="9" fill="rgba(232,201,122,0.5)"/>
    <ellipse cx="22" cy="88" rx="14" ry="3" fill="#8B6914"/>
    <line x1="16" y1="88" x2="14" y2="106" stroke="#C9A84C" stroke-width="1"/>
    <line x1="22" y1="88" x2="22" y2="108" stroke="#C9A84C" stroke-width="1"/>
    <line x1="28" y1="88" x2="30" y2="106" stroke="#C9A84C" stroke-width="1"/>
    <circle cx="14" cy="108" r="2.5" fill="#C9A84C"/>
    <circle cx="22" cy="110" r="2.5" fill="#C9A84C"/>
    <circle cx="30" cy="108" r="2.5" fill="#C9A84C"/>
  </svg>
</div>

<main>
  <p class="arabic" id="txt-arabic">عيد مبارك</p>

  <div class="divider">
    <span></span>
    <div class="diamond"></div>
    <div class="diamond" style="width:6px;height:6px;background:transparent;border:1px solid #C9A84C"></div>
    <div class="diamond"></div>
    <span></span>
  </div>

  <div class="headline" id="txt-eid">
    Eid <small id="txt-sub">Mubarak</small>
  </div>

  <p class="message" id="txt-msg">
    May this blessed occasion fill your heart with joy,<br>
    your home with laughter, and your life with love.<br>
    Wishing you peace, prosperity, and countless blessings.
  </p>

  <div class="from">
    <p>With warm wishes from</p>
    <p id="txt-name">Syed Mahad Shah</p>
  </div>
</main>

<div id="panel" class="hide">
  <h3>✦ Customize</h3>
  <label>Your Name</label>
  <input id="i-name" value="Syed Mahad Shah">
  <label>Arabic Text</label>
  <input id="i-arabic" value="عيد مبارك">
  <label>Message</label>
  <textarea id="i-msg" rows="3">May this blessed occasion fill your heart with joy, your home with laughter, and your life with love. Wishing you peace, prosperity, and countless blessings.</textarea>
  <button class="btn" onclick="apply()">Apply</button>
  <button class="btn out" onclick="download()">Download</button>
</div>

<button id="fab" onclick="toggle()">✦</button>

<script>
const s = document.getElementById('stars');
for (let i = 0; i < 150; i++) {
  const el = document.createElement('div');
  const sz = Math.random() * 2.5 + 0.5;
  el.className = 'star';
  el.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+2).toFixed(1)}s;--dl:${(Math.random()*5).toFixed(1)}s;--op:${(Math.random()*0.7+0.2).toFixed(2)}`;
  s.appendChild(el);
}

for (let i = 0; i < 15; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.cssText = `left:${Math.random()*100}%;--pd:${(Math.random()*10+7).toFixed(1)}s;--pdl:${(Math.random()*8).toFixed(1)}s`;
  document.body.appendChild(p);
}

let open = false;
function toggle() {
  open = !open;
  document.getElementById('panel').classList.toggle('hide', !open);
  const fab = document.getElementById('fab');
  fab.classList.toggle('open', open);
  fab.textContent = open ? '✕' : '✦';
}

function apply() {
  const n = document.getElementById('i-name').value;
  const a = document.getElementById('i-arabic').value;
  const m = document.getElementById('i-msg').value;
  if (n) document.getElementById('txt-name').textContent = n;
  if (a) document.getElementById('txt-arabic').textContent = a;
  if (m) document.getElementById('txt-msg').innerHTML = m.replace(/\n/g, '<br>');
}

['i-name','i-arabic','i-msg'].forEach(id => {
  document.getElementById(id).addEventListener('input', apply);
});

function download() {
  apply();
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([document.documentElement.outerHTML], {type:'text/html'}));
  a.download = 'eid-mubarak.html';
  a.click();
}
</script>
</body>
</html>
